name: html_viewer
description: App para abrir páginas HTML via QR Code ou NFC

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.7.0
  mobile_scanner: ^5.1.1
  nfc_manager: ^3.3.0
  url_launcher: ^6.2.6
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
